<section class="page-background helpdesk-queues-page">
  <div class="animated-orb orb-1"></div>
  <div class="animated-orb orb-2"></div>
  <div class="animated-orb orb-3"></div>
  <div class="grid-pattern"></div>

  <app-breadcrumbs></app-breadcrumbs>

  <section class="glass-card hero-card">
    <div>
      <h1 class="hero-title">Help Desk Queues</h1>
      <p class="hero-subtitle">Configure operational queues for support ownership and triage.</p>
    </div>
    <button pButton type="button" class="crm-button crm-button--primary" icon="pi pi-plus" label="New Queue" (click)="openCreate()"></button>
  </section>

  <section class="glass-card">
    <p-table [value]="rows()" [loading]="loading()">
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Active Members</th>
          <th>Status</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>{{ row.name }}</td>
          <td>{{ row.description || '-' }}</td>
          <td>{{ row.activeMemberCount }}</td>
          <td>{{ row.isActive ? 'Active' : 'Inactive' }}</td>
          <td class="actions">
            <button pButton type="button" class="crm-button crm-button--text" icon="pi pi-pencil" label="Edit" (click)="openEdit(row)"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </section>

  <p-dialog [header]="editing() ? 'Edit Queue' : 'Create Queue'" [visible]="visible()" [modal]="true" [style]="{ width: '34rem' }" (onHide)="visible.set(false)">
    <form class="queue-form" [formGroup]="form">
      <label class="field">
        <span>Name</span>
        <input pInputText formControlName="name" />
      </label>
      <label class="field">
        <span>Description</span>
        <input pInputText formControlName="description" />
      </label>
      <label class="checkbox">
        <input type="checkbox" formControlName="isActive" />
        Active queue
      </label>
    </form>
    <ng-template pTemplate="footer">
      <button pButton type="button" class="crm-button crm-button--ghost" label="Cancel" (click)="visible.set(false)"></button>
      <button pButton type="button" class="crm-button crm-button--primary" label="Save" (click)="save()"></button>
    </ng-template>
  </p-dialog>
</section>
