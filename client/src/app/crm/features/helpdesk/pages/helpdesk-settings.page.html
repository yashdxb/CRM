<section class="page-background helpdesk-settings-page">
  <div class="animated-orb orb-1"></div>
  <div class="animated-orb orb-2"></div>
  <div class="animated-orb orb-3"></div>
  <div class="grid-pattern"></div>

  <app-breadcrumbs></app-breadcrumbs>

  <section class="glass-card hero-card">
    <div>
      <h1 class="hero-title">Help Desk Settings</h1>
      <p class="hero-subtitle">Manage SLA targets for priority/severity combinations.</p>
    </div>
  </section>

  <section class="glass-card">
    <p-table [value]="rows()" [loading]="loading()">
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Priority</th>
          <th>Severity</th>
          <th>First Response (min)</th>
          <th>Resolution (min)</th>
          <th>Escalation (min)</th>
          <th>Status</th>
          <th></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td><input pInputText [(ngModel)]="row.name" /></td>
          <td>{{ row.priority }}</td>
          <td>{{ row.severity }}</td>
          <td><p-inputNumber [(ngModel)]="row.firstResponseTargetMinutes" [min]="1"></p-inputNumber></td>
          <td><p-inputNumber [(ngModel)]="row.resolutionTargetMinutes" [min]="1"></p-inputNumber></td>
          <td><p-inputNumber [(ngModel)]="row.escalationMinutes" [min]="1"></p-inputNumber></td>
          <td>{{ row.isActive ? 'Active' : 'Inactive' }}</td>
          <td>
            <button pButton type="button" class="crm-button crm-button--primary crm-button--sm" label="Save" [loading]="savingRowId() === row.id" (click)="saveRow(row)"></button>
          </td>
        </tr>
      </ng-template>
    </p-table>
  </section>
</section>
