<section class="palette-card">
  <div class="palette-card__header">
    <div>
      <h3>Build blocks</h3>
      <p>Start with the path you want to automate. Add only the nodes you need.</p>
    </div>
    <span class="palette-pill">Drag or quick-add</span>
  </div>

  <span class="p-input-icon-left">
    <i class="pi pi-search"></i>
    <input
      pInputText
      type="text"
      [(ngModel)]="search"
      placeholder="Search nodes"
      aria-label="Search nodes"
    />
  </span>

  <div class="palette-list">
    <div
      class="palette-node"
      draggable="true"
      *ngFor="let template of filteredTemplates"
      (dragstart)="onNodeDragStart($event, template.type)"
      [attr.aria-label]="'Drag ' + template.label + ' node'"
    >
      <i [class]="template.icon" aria-hidden="true"></i>
      <div class="node-copy">
        <span>{{ template.label }}</span>
        <small>{{ template.hint }}</small>
      </div>
      <button
        pButton
        type="button"
        class="btn btn-ghost btn-sm"
        (click)="addNode.emit(template.type)"
        [attr.aria-label]="'Add ' + template.label + ' node'"
      >
        Add
      </button>
    </div>
  </div>
  <button pButton type="button" class="btn btn-secondary" (click)="addApprovalStep.emit()">
    <i class="pi pi-plus"></i>
    <span>Quick Add Approval Step</span>
  </button>
  <small>{{ filteredTemplates.length }} node types shown. Start and End are managed automatically by validation.</small>
</section>
