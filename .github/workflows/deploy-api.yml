name: Deploy .NET API to Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - 'server/src/CRM.Enterprise.Api/**'
      - 'server/src/CRM.Enterprise.Infrastructure/**'
      - 'server/src/CRM.Enterprise.Workflows/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.101'

      - name: Configure Telerik NuGet feed
        run: |
          if [ -z "${{ secrets.TELERIK_NUGET_USERNAME }}" ] || [ -z "${{ secrets.TELERIK_NUGET_PASSWORD }}" ]; then
            echo "Telerik NuGet feed credentials are not configured."
            exit 1
          fi
          dotnet nuget remove source telerik || true
          dotnet nuget add source https://nuget.telerik.com/v3/index.json \
            --name telerik \
            --username "${{ secrets.TELERIK_NUGET_USERNAME }}" \
            --password "${{ secrets.TELERIK_NUGET_PASSWORD }}" \
            --store-password-in-clear-text

      - name: Restore dependencies
        run: dotnet restore server/src/CRM.Enterprise.Api/CRM.Enterprise.Api.csproj

      - name: Build
        run: dotnet build server/src/CRM.Enterprise.Api/CRM.Enterprise.Api.csproj --configuration Release --no-restore

      - name: Publish
        run: |
          rm -rf ./artifacts/publish
          dotnet publish server/src/CRM.Enterprise.Api/CRM.Enterprise.Api.csproj \
            --configuration Release \
            --output ./artifacts/publish
          rm -f ./artifacts/api.zip
          cd ./artifacts/publish
          zip -r ../api.zip .

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --resource-group rg-crm-dev-ca \
            --name crm-enterprise-api-dev-01122345 \
            --src-path ./artifacts/api.zip \
            --type zip \
            --clean true \
            --restart true \
            --enable-kudu-warmup true \
            --track-status false \
            --timeout 1800000

      - name: Set Azure Web App environment to Production
        run: |
          az webapp config appsettings set \
            --resource-group rg-crm-dev-ca \
            --name crm-enterprise-api-dev-01122345 \
            --settings \
              ASPNETCORE_ENVIRONMENT=Production

      - name: Configure Azure Web App runtime and startup command
        run: |
          az webapp config set \
            --resource-group rg-crm-dev-ca \
            --name crm-enterprise-api-dev-01122345 \
            --linux-fx-version "DOTNETCORE|10.0" \
            --startup-file ""

      - name: Post-deploy health verification
        run: |
          API_URL="https://crm-enterprise-api-dev-01122345.azurewebsites.net"
          echo "Waiting 90s for App Service to restart after deployment..."
          sleep 90

          # Retry /health up to 20 times (every 20s = 400s total wait after initial delay)
          for i in $(seq 1 20); do
            echo "Health check attempt $i/20..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$API_URL/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ /health returned 200"
              break
            fi
            echo "  /health returned $HTTP_STATUS — retrying in 20s..."
            sleep 20
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ /health did not return 200 after 20 attempts (last: $HTTP_STATUS)"
            exit 1
          fi

          # Verify /api/auth/config (critical for login)
          CONFIG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_URL/api/auth/config")
          if [ "$CONFIG_STATUS" = "200" ]; then
            echo "✅ /api/auth/config returned 200"
          else
            echo "❌ /api/auth/config returned $CONFIG_STATUS — login will fail!"
            exit 1
          fi

          # Verify /healthz (includes DB check)
          HEALTHZ_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$API_URL/healthz")
          if [ "$HEALTHZ_STATUS" = "200" ]; then
            echo "✅ /healthz (with DB) returned 200"
          else
            echo "⚠️  /healthz returned $HEALTHZ_STATUS — DB may be unreachable"
          fi

          # Verify startup command is empty (deployment guardrail)
          STARTUP_CMD=$(az webapp config show \
            --resource-group rg-crm-dev-ca \
            --name crm-enterprise-api-dev-01122345 \
            --query appCommandLine -o tsv)
          if [ -z "$STARTUP_CMD" ]; then
            echo "✅ appCommandLine is empty (correct)"
          else
            echo "❌ appCommandLine is '$STARTUP_CMD' — must be empty! Clearing..."
            az webapp config set \
              --resource-group rg-crm-dev-ca \
              --name crm-enterprise-api-dev-01122345 \
              --startup-file ""
          fi

          echo ""
          echo "=== Post-deploy verification complete ==="
