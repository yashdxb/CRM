name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
    paths:
      - "client/**"
      - ".github/workflows/**"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master
    paths:
      - "client/**"
      - ".github/workflows/**"

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false
      - name: Use Node.js 22.12
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client
      - name: Build client
        run: npm run build
        working-directory: client
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_0D9D1FE0F }}
          action: "upload"
          app_location: "./client/dist/CRM-Enterprise/browser"
          api_location: ""
          skip_app_build: true

      - name: Post-deploy API connectivity check
        run: |
          API_URL="https://crm-enterprise-api-dev-01122345.azurewebsites.net"
          SWA_URL="https://jolly-dune-0d9d1fe0f.2.azurestaticapps.net"

          echo "Verifying API is reachable from CI (simulates SWA → API connectivity)..."

          # Check /health
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_URL/health" || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ API /health returned 200"
          else
            echo "⚠️  API /health returned $HTTP_STATUS — the API may be restarting. Login might fail until the API is back."
          fi

          # Check /api/auth/config
          CONFIG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$API_URL/api/auth/config")
          if [ "$CONFIG_STATUS" = "200" ]; then
            echo "✅ API /api/auth/config returned 200"
          else
            echo "⚠️  API /api/auth/config returned $CONFIG_STATUS — login config may not load"
          fi

          # Check CORS headers
          CORS_CHECK=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X OPTIONS \
            -H "Origin: $SWA_URL" \
            -H "Access-Control-Request-Method: POST" \
            "$API_URL/api/auth/login")
          if [ "$CORS_CHECK" = "200" ] || [ "$CORS_CHECK" = "204" ]; then
            echo "✅ CORS preflight returned $CORS_CHECK"
          else
            echo "⚠️  CORS preflight returned $CORS_CHECK — CORS may be misconfigured"
          fi

          # Verify SWA is serving content
          SWA_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$SWA_URL")
          if [ "$SWA_STATUS" = "200" ]; then
            echo "✅ SWA is serving content (HTTP $SWA_STATUS)"
          else
            echo "⚠️  SWA returned $SWA_STATUS"
          fi

          echo ""
          echo "=== Post-deploy connectivity check complete ==="

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_JOLLY_DUNE_0D9D1FE0F }}
          action: "close"
